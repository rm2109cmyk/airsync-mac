name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies

      - name: Build App
        run: |
          # 1. We use the correct scheme name found in your project
          xcodebuild -project AirSync.xcodeproj \
            -scheme "AirSync Self Compiled" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            OTHER_SWIFT_FLAGS="-D SELF_COMPILED" \
            -destination 'platform=macOS'

      - name: Bundle and Zip
        run: |
          # 2. Find the app and zip it up
          APP_PATH=$(find build/Build/Products/Release -name "AirSync.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App not found in standard path, searching everywhere..."
            APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ../../../AirSync-Mac-Plus-Update.zip AirSync.app
          else
            echo "Build failed - .app file was never created."
            exit 1
          fi

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus-Update
          path: AirSync-Mac-Plus-Update.zip
