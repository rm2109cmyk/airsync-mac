name: Build AirSync Mac (Plus)
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App
        run: |
          # 1. Force the Mac to find the project
          FILE=$(ls -d *.xcworkspace 2>/dev/null || ls -d *.xcodeproj 2>/dev/null)
          TYPE=$([[ $FILE == *.xcworkspace ]] && echo "-workspace" || echo "-project")
          
          # 2. Build with "Plus" features unlocked and security checks disabled
          xcodebuild $TYPE "$FILE" \
            -scheme "AirSync Self Compiled" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Find and Zip App
        run: |
          # Find the app wherever it was built and zip it up
          APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          cd "$(dirname "$APP_PATH")"
          zip -r ../../../AirSync-Mac-Plus.zip AirSync.app

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
