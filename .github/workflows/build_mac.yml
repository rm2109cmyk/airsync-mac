name: Build AirSync

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Build App
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            echo "Building workspace: $WORKSPACE"
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "AirSync Self Compiled" \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build
          else
            echo "Building project: $PROJECT"
            xcodebuild \
              -project "$PROJECT" \
              -scheme "AirSync Self Compiled" \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build
          fi

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: AirSync
          path: build/Build/Products/Release/AirSync.app
