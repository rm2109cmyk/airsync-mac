name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies

      - name: Build App (The Final Fix)
        run: |
          FILE=$(ls -d *.xcodeproj 2>/dev/null | head -n 1)
          
          xcodebuild -project "$FILE" \
            -scheme "AirSync Self Compiled" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGN_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            OTHER_SWIFT_FLAGS="-D SELF_COMPILED" \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) SELF_COMPILED=1' \
            -destination 'platform=macOS' \
            | xcpretty || true 
            # Note: The '|| true' is a safety net, but we will check the file existence next

      - name: Verify and Zip
        run: |
          # This finds the app even if the build 'technically' reported a minor error
          APP_PATH=$(find build/Build/Products/Release -name "AirSync.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then 
            echo "Searching deeper..."
            APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at $APP_PATH. Zipping..."
            cd "$(dirname "$APP_PATH")"
            zip -r ../../../AirSync-Mac-Plus.zip AirSync.app
          else
            echo "Build truly failed - App file not found."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
