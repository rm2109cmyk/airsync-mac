name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    # Changed from macos-14 to macos-latest to get Xcode 26+
    runs-on: macos-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App
        run: |
          # 1. Find the project file
          FILE=$(ls -d *.xcodeproj 2>/dev/null | head -n 1)
          
          # 2. Build with "Self Compiled" scheme and skip all code signing
          xcodebuild -project "$FILE" \
            -scheme "AirSync Self Compiled" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY=""

      - name: Zip App
        run: |
          # Find where the app ended up and zip it
          APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          cd "$(dirname "$APP_PATH")"
          zip -r ../../../AirSync-Mac-Plus.zip AirSync.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
