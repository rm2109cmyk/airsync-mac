name: Build AirSync Mac

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Detect Project Type
        id: detect
        run: |
          if ls *.xcworkspace 1> /dev/null 2>&1; then
            echo "type=workspace" >> $GITHUB_OUTPUT
            echo "file=$(ls *.xcworkspace | head -n 1)" >> $GITHUB_OUTPUT
          else
            echo "type=project" >> $GITHUB_OUTPUT
            echo "file=$(ls *.xcodeproj | head -n 1)" >> $GITHUB_OUTPUT
          fi

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies

      - name: Build App
        run: |
          if [ "${{ steps.detect.outputs.type }}" = "workspace" ]; then
            xcodebuild \
              -workspace "${{ steps.detect.outputs.file }}" \
              -scheme "AirSync Self Compiled" \
              -configuration Release \
              -derivedDataPath build \
              MACOSX_DEPLOYMENT_TARGET=15.0 \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          else
            xcodebuild \
              -project "${{ steps.detect.outputs.file }}" \
              -scheme "AirSync Self Compiled" \
              -configuration Release \
              -derivedDataPath build \
              MACOSX_DEPLOYMENT_TARGET=15.0 \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          fi

      - name: Find built app
        run: |
          APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Zip App
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r AirSync-Mac.zip AirSync.app
          mv AirSync-Mac.zip $GITHUB_WORKSPACE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build
          name: AirSync Auto Build
          files: AirSync-Mac.zip
