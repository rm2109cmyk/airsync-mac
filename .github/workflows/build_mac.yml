name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies

      - name: Build App
        run: |
          FILE=$(ls -d *.xcodeproj 2>/dev/null | head -n 1)

          xcodebuild -project "$FILE" \
            -scheme "AirSync Self Compiled" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGN_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            -destination 'platform=macOS'

      - name: Bundle and Zip
        run: |
          APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)

          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ../../../AirSync-Mac-Plus.zip AirSync.app
          else
            echo "Build failed."
            exit 1
          fi

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
        
