name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App (Plus Unlocked)
        run: |
          FILE=$(ls -d *.xcodeproj 2>/dev/null | head -n 1)
          
          xcodebuild -project "$FILE" \
            -scheme "AirSync" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PRODUCT_BUNDLE_IDENTIFIER="com.myself.airsync.plus" \
            OTHER_SWIFT_FLAGS="-D SELF_COMPILED" \
            SKIP_INSTALL=YES \
            -destination 'platform=macOS'

      - name: Zip App
        run: |
          # We look in the 'build' folder for the finished .app
          APP_PATH=$(find build/Build/Products/Release -name "AirSync.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "App not found!"; exit 1; fi
          
          cd "$(dirname "$APP_PATH")"
          zip -r ../../../../AirSync-Mac-Plus.zip AirSync.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
