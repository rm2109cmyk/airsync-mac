name: Build AirSync Mac (Plus)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App (Main Scheme Hijack)
        run: |
          FILE=$(ls -d *.xcodeproj 2>/dev/null | head -n 1)
          
          # Notice we changed the scheme to "AirSync" 
          # We added OTHER_SWIFT_FLAGS to manually trigger the Plus unlock
          xcodebuild -project "$FILE" \
            -scheme "AirSync" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            OTHER_SWIFT_FLAGS="-D SELF_COMPILED" \
            -destination 'platform=macOS'

      - name: Zip App
        run: |
          APP_PATH=$(find build -name "AirSync.app" -type d | head -n 1)
          cd "$(dirname "$APP_PATH")"
          zip -r ../../../AirSync-Mac-Plus.zip AirSync.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Mac-Plus
          path: AirSync-Mac-Plus.zip
